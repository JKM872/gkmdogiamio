name: Midnight Auto Scraping (All Sports)

on:
  schedule:
    # Dwa crony zapewniają uruchomienie o 02:00 polskiego czasu niezależnie od pory roku:
    # Zimą (CET, UTC+1): 01:00 UTC = 02:00 PL ✓
    # Latem (CEST, UTC+2): 00:00 UTC = 02:00 PL ✓
    # Job "timezone-guard" pilnuje, żeby nie uruchomić się podwójnie
    - cron: '0 1 * * *'
    - cron: '0 0 * * *'
  
  # Możliwość ręcznego uruchomienia (zakładka Actions na GitHub)
  workflow_dispatch:

jobs:
  # 🕐 TIMEZONE GUARD - sprawdza czy jest 02:00 czasu polskiego
  timezone-guard:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
    - name: 🕐 Check Polish time (CET/CEST)
      id: check
      run: |
        # Pobierz aktualną godzinę w strefie Europe/Warsaw
        POLISH_HOUR=$(TZ=Europe/Warsaw date +%H)
        echo "🕐 Aktualna godzina polska: ${POLISH_HOUR}:00"
        
        # Uruchom tylko jeśli jest godzina 02 (lub ręczny dispatch)
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "✅ Ręczne uruchomienie - pomijam sprawdzanie czasu"
          echo "should_run=true" >> $GITHUB_OUTPUT
        elif [ "$POLISH_HOUR" = "02" ] || [ "$POLISH_HOUR" = "01" ] || [ "$POLISH_HOUR" = "03" ]; then
          echo "✅ Godzina ${POLISH_HOUR}:00 PL - uruchamiam scraping"
          echo "should_run=true" >> $GITHUB_OUTPUT
        else
          echo "⏳ Godzina ${POLISH_HOUR}:00 PL - NIE jest 02:00, pomijam"
          echo "should_run=false" >> $GITHUB_OUTPUT
        fi

  # ⚽ FOOTBALL
  football:
    needs: timezone-guard
    if: needs.timezone-guard.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 godzin (maksimum GitHub Actions) dla 2500+ meczów
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: 🐍 Setup Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: 🌐 Install Chrome & ChromeDriver
      run: |
        sudo apt-get update
        sudo apt-get install -y chromium-browser chromium-chromedriver
    
    - name: 📦 Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: ⚽ Run Football Scraping
      run: |
        # Użyj timezone polskiego (Europe/Warsaw) zamiast UTC
        TODAY=$(TZ=Europe/Warsaw date +%Y-%m-%d)
        echo "🗓️ Scraping Football dla daty: $TODAY"
        
        # Mail 1: Zdarzenia z przewagą formy + kursy
        echo ""
        echo "═══════════════════════════════════════════════════════════"
        echo "📧 MAIL 1/2: Zdarzenia z PRZEWAGĄ FORMY + KURSY"
        echo "═══════════════════════════════════════════════════════════"
        python scrape_and_notify.py \
          --date $TODAY \
          --sports football \
          --to jakub.majka.zg@gmail.com \
          --from-email jakub.majka.zg@gmail.com \
          --password "${{ secrets.EMAIL_PASSWORD }}" \
          --headless \
          --sort time \
          --only-form-advantage \
          --skip-no-odds || echo "⚠️ Mail 1 zakończył się błędem (może brak zdarzeń)"
        
        # Poczekaj 10 sekund między mailami
        echo ""
        echo "⏳ Czekam 10 sekund przed wysłaniem mail 2..."
        sleep 10
        
        # Mail 2: Wszystkie kwalifikujące się zdarzenia z kursami
        echo ""
        echo "═══════════════════════════════════════════════════════════"
        echo "📧 MAIL 2/2: WSZYSTKIE KWALIFIKUJĄCE + KURSY"
        echo "═══════════════════════════════════════════════════════════"
        python scrape_and_notify.py \
          --date $TODAY \
          --sports football \
          --to jakub.majka.zg@gmail.com \
          --from-email jakub.majka.zg@gmail.com \
          --password "${{ secrets.EMAIL_PASSWORD }}" \
          --headless \
          --sort time \
          --skip-no-odds || echo "⚠️ Mail 2 zakończył się błędem (może brak zdarzeń)"
        
        # Poczekaj 10 sekund przed Mail 3
        echo ""
        echo "⏳ Czekam 10 sekund przed wysłaniem mail 3..."
        sleep 10
        
        # Mail 3: Over/Under Statistics
        echo ""
        echo "═══════════════════════════════════════════════════════════"
        echo "📧 MAIL 3/3: OVER/UNDER STATISTICS"
        echo "═══════════════════════════════════════════════════════════"
        python scrape_and_notify.py \
          --date $TODAY \
          --sports football \
          --to jakub.majka.zg@gmail.com \
          --from-email jakub.majka.zg@gmail.com \
          --password "${{ secrets.EMAIL_PASSWORD }}" \
          --headless \
          --sort time \
          --only-over-under \
          --skip-no-odds || echo "⚠️ Mail 3 zakończył się błędem (może brak zdarzeń)"
        
        echo ""
        echo "✅ Football scraping zakończony (3 maile wysłane)!"
      
      env:
        DISPLAY: ':99'
    
    - name: 📊 Upload Football outputs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: football-results-${{ github.run_number }}
        path: outputs/*football*.csv
        if-no-files-found: ignore
